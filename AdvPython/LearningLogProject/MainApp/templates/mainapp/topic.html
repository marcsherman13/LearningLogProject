{% extends "MainApp/base.html" %}

{% block content %}

<p>Topic: {{ topic }}</p>


<ul>
    {% for e in entries %}

    <p>{{e.text}}</p>
    <p>{{e.date_added}}</p>
    <p>
        <a href="{% url 'MainApp:edit_entry' e.id %}">Edit entry</a>
    </p>
    {% empty %}
    <li>No entries have been added yet.</li>
    {% endfor %}
</ul>

<p>
    <a href="{% url 'MainApp:new_entry' topic.id %}">Add a new entry</a>
</p>

{% endblock content %}
